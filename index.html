<script>
    const S_ID = '15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx';
    // Is baar hum simplified JSON fetch karenge
    const G_URL = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json&sheet=Products`;

    let sheetData = [];
    let cart = [];

    async function init() {
        try {
            const r = await fetch(G_URL);
            const t = await r.text();
            // Data ko saaf karke JSON banana
            const j = JSON.parse(t.substring(47, t.length - 2));
            sheetData = j.table.rows;
            console.log("Data Loaded!");
        } catch(e) { 
            console.error("Connection Error", e);
            alert("Sheet connect nahi ho rahi!"); 
        }
    }

    function openView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-cart') renderCart();
    }

    function processSub(main) {
        let subs = {};
        let lastM = ""; 
        
        sheetData.forEach(row => {
            // Hum seedha Column C (Index 2) dekh rahe hain Category ke liye
            let m = (row.c[2] && row.c[2].v) ? row.c[2].v : lastM;
            if(m) lastM = m;

            let currentCat = lastM.toString().toLowerCase().trim();
            let searchCat = main.toLowerCase().trim();

            // Masale wali condition
            let match = (currentCat === searchCat) || 
                        (searchCat === 'masale' && (currentCat === 'mirchi' || currentCat === 'haldi' || currentCat === 'masala'));

            if(match) {
                let s = (row.c[3] && row.c[3].v) ? row.c[3].v : ""; // Column D: Sub Category
                let img = (row.c[6] && row.c[6].v) ? row.c[6].v : ""; // Column G: Image
                if(s && !subs[s]) subs[s] = img;
            }
        });

        let h = '';
        for(let s in subs) {
            let imgSrc = (subs[s] && subs[s].includes('http')) ? subs[s] : 'https://cdn-icons-png.flaticon.com/512/3081/3081913.png';
            h += `
            <div class="card" onclick="processProd('${main}','${s}')">
                <img src="${imgSrc}" style="width:100%; height:110px; object-fit:cover; border-radius:15px;">
                <h3>${s}</h3>
            </div>`;
        }
        document.getElementById('sub-grid').innerHTML = h || `<p style="text-align:center; padding:20px;">Abhi koi data nahi mila.</p>`;
        document.getElementById('sub-head').innerText = main;
        openView('view-sub');
    }

    function processProd(main, sub) {
        let h = '';
        let lastM = "", lastN = "", lastS = "", lastI = "";

        sheetData.forEach(row => {
            let n = (row.c[1] && row.c[1].v) ? row.c[1].v : lastN; if(n) lastN = n;
            let m = (row.c[2] && row.c[2].v) ? row.c[2].v : lastM; if(m) lastM = m;
            let s = (row.c[3] && row.c[3].v) ? row.c[3].v : lastS; if(s) lastS = s;
            let i = (row.c[6] && row.c[6].v) ? row.c[6].v : lastI; if(i && i.includes('http')) lastI = i;

            let currentCat = lastM.toString().toLowerCase().trim();
            let searchCat = main.toLowerCase().trim();
            let match = (currentCat === searchCat) || 
                        (searchCat === 'masale' && (currentCat === 'mirchi' || currentCat === 'haldi' || currentCat === 'masala'));

            if(match && lastS === sub) {
                let w = (row.c[4] && row.c[4].v) ? row.c[4].v : ""; // Net Weight
                let p = (row.c[5] && row.c[5].v) ? row.c[5].v : ""; // Price
                if(w && p) {
                    h += `
                    <div class="item-row" style="display:flex; align-items:center; gap:15px; background:white; padding:12px; margin-bottom:10px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                        <img src="${lastI || 'https://via.placeholder.com/60'}" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">
                        <div style="flex:1">
                            <h4 style="margin:0;">${lastN}</h4>
                            <p style="margin:5px 0; color:#666;">${w} - <b>₹${p}</b></p>
                        </div>
                        <button onclick="add('${lastN}','${w}','${p}')" style="background:#f4b41a; border:none; padding:8px 12px; border-radius:8px; font-weight:bold;">Add +</button>
                    </div>`;
                }
            }
        });
        document.getElementById('product-list').innerHTML = h || "Saaman khatam ho gaya!";
        document.getElementById('prod-head').innerText = sub;
        document.getElementById('btn-back-prod').onclick = () => processSub(main);
        openView('view-products');
    }

    function add(n,w,p) {
        cart.push({n,w,p:parseInt(p)});
        document.getElementById('badge').innerText = cart.length;
        alert(n + " Cart mein gaya!");
    }

    function renderCart() {
        let h = '', t = 0;
        cart.forEach((item, i) => {
            t += item.p;
            h += `<div class="item-row" style="display:flex; justify-content:space-between; background:white; padding:15px; margin-bottom:10px; border-radius:10px;">
                    <div><h4 style="margin:0;">${item.n} (${item.w})</h4><b>₹${item.p}</b></div>
                    <button onclick="remove(${i})" style="color:red; border:none; background:none; font-size:18px;">&times;</button>
                  </div>`;
        });
        document.getElementById('cart-items').innerHTML = h || "Cart khaali hai";
        document.getElementById('cart-total').innerHTML = `<h3 style="text-align:right;">Total: ₹${t}</h3>`;
    }

    function remove(i) { cart.splice(i,1); document.getElementById('badge').innerText = cart.length; renderCart(); }

    function sendToWA() {
        if(cart.length === 0) return alert("Pehle saman add karein!");
        let msg = "*Rana Ji Aata Chakki Order*\n\n";
        cart.forEach((item, i) => msg += `${i+1}. ${item.n} (${item.w}) - ₹${item.p}\n`);
        msg += `\n*Total Amount: ₹${cart.reduce((a,b)=>a+b.p,0)}*`;
        window.open(`https://wa.me/918923357537?text=${encodeURIComponent(msg)}`);
    }

    window.onload = init;
</script>
