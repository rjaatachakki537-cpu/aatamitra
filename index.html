<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aata Mitra - Rana Ji</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #f4b41a; --dark: #4a2c2a; --bg: #fff9e6; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 70px; }
        
        /* Splash Screen */
        #splash { position: fixed; top: 0; width: 100%; height: 100%; background: var(--main); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        /* Navbar */
        .nav { background: var(--dark); color: var(--main); padding: 15px; position: sticky; top: 0; display: flex; justify-content: space-between; z-index: 100; }
        
        /* Product Card */
        .container { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #white; border: 1px solid #ddd; border-radius: 10px; padding: 10px; text-align: center; background: white; }
        .card img { width: 100%; border-radius: 8px; height: 120px; object-fit: cover; }
        .price { color: green; font-weight: bold; margin: 5px 0; }
        .order-btn { background: var(--main); border: none; padding: 8px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Bottom Menu */
        .bottom-menu { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--main); }
    </style>
</head>
<body>

<div id="splash">
    <i class="fas fa-wheat-awn fa-3x"></i>
    <h1>AATA MITRA</h1>
    <p>Rana Ji Aata Chakki</p>
</div>

<div class="nav">
    <span><b>Rana Ji Aata Chakki</b></span>
    <i class="fas fa-shopping-cart"></i>
</div>

<div class="container" id="product-list">
    </div>

<div class="bottom-menu">
    <div onclick="location.reload()"><i class="fas fa-home"></i><br>Home</div>
    <div onclick="window.open('https://wa.me/918923357537')"><i class="fab fa-whatsapp"></i><br>Help</div>
</div>

<script>
    // Splash Timeout
    setTimeout(() => document.getElementById('splash').style.display='none', 2500);

    const SHEET_ID = '15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx';
    const G_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Products`;

    async function loadData() {
        const res = await fetch(G_URL);
        const text = await res.text();
        const json = JSON.parse(text.substr(47).slice(0, -2));
        const items = json.table.rows;
        
        let html = '';
        items.forEach(row => {
            if(row.c[7].v === 'Live') {
                const name = row.c[1].v;
                const price = row.c[3].v;
                const img = row.c[6].v;
                html += `
                <div class="card">
                    <img src="${img}">
                    <h4>${name}</h4>
                    <p class="price">₹${price}</p>
                    <button class="order-btn" onclick="orderNow('${name}')">Order Now</button>
                </div>`;
            }
        });
        document.getElementById('product-list').innerHTML = html;
    }

    function orderNow(pName) {
        let msg = `Hello Rana Ji, mujhe "${pName}" order karna hai. Details batayein.`;
        window.open(`https://wa.me/918923357537?text=${encodeURIComponent(msg)}`); 
        // 
    }

    loadData();
</script>
</body>
</html>
