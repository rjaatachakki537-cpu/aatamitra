<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aata Mitra - Rana Ji Aata Chakki</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash-screen">
        <img src="welcome.jpg" alt="Splash">
        <div class="splash-text">
            <h1>AATA MITRA</h1>
            <p>Rana Ji Aata Chakki</p>
        </div>
    </div>

    <div id="login-screen" style="display:none;">
        <div class="login-container">
            <img src="welcome.jpg" class="login-logo">
            <h2>Welcome Bhai!</h2>
            <input type="text" id="name-input" placeholder="Apna Naam Likho">
            <input type="number" id="mobile-input" placeholder="Mobile Number">
            <button onclick="sendOTP()" class="btn">OTP Bhejo</button>
            
            <div id="otp-section" style="display:none;">
                <input type="number" id="otp-input" placeholder="OTP Dalo (1234)">
                <button onclick="verifyOTP()" class="btn success">Verify Karo</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header class="header">
            <div onclick="toggleSidebar()">☰</div>
            <h2 id="admin-trigger">RANA JI AATA CHAKKI</h2>
            <div id="delivery-trigger">👤 Profile</div>
        </header>

        <div id="banner-area"></div>
        <div class="category-bar">
            <span>🌾 Atta</span><span>🌶️ Masala</span><span>🟡 Oil</span>
        </div>
        <div id="product-list"></div>

        <nav class="bottom-nav">
            <div onclick="showTab('home')">🏠 Home</div>
            <div onclick="showTab('cart')">🛒 Cart</div>
            <div onclick="showTab('track')">📦 Track</div>
        </nav>
    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>
    <script src="splash.js"></script>
    <script src="admin.js"></script>
    <script src="tracking.js"></script>
</body>
</html>
