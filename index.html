<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aata Mitra</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:swght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash-screen">
        <img src="welcome.jpg" style="width:100%; height:100%; object-fit:cover;">
    </div>

    <div id="login-screen" style="display:none; padding:20px; text-align:center;">
        <img src="welcome.jpg" style="width:120px; border-radius:50%; margin-bottom:20px; border:4px solid #f1c40f;">
        <h2>Login</h2>
        <input type="number" id="mobile-input" placeholder="Mobile Number">
        <button onclick="sendOTP()" class="btn btn-primary">OTP Bhejo</button>
        <div id="otp-section" style="display:none; margin-top:15px;">
            <input type="number" id="otp-input" placeholder="Enter 1234">
            <button onclick="verifyOTP()" class="btn btn-success">Verify</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header class="header">
            <div onclick="openMenu()" style="font-size:24px; cursor:pointer;">☰</div>
            <b id="admin-trigger" style="cursor:pointer;">RANA JI AATA CHAKKI</b>
            <div style="position:relative; cursor:pointer;" onclick="showTab('cart')">
                🛒 <span id="cart-count">0</span>
            </div>
        </header>

        <div class="category-bar" id="category-list">
            </div>

        <div id="banner-area"></div>

        <div style="padding:10px 15px; font-weight:bold;">Taza Saman 👇</div>
        <div id="product-list"></div>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="showTab('home')">🏠<br>Home</div>
            <div class="nav-item" onclick="showTab('cart')">🛒<br>Cart</div>
            <div class="nav-item" onclick="showTab('track')">📦<br>Track</div>
        </nav>
    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>
    <script src="splash.js"></script>
</body>
</html>
