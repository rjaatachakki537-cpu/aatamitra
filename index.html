<script>
    const SHEET_ID = '15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx'; 
    const G_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Products`;

    let allRows = [];

    async function loadSheetData() {
        try {
            const res = await fetch(G_URL);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            allRows = json.table.rows;
            console.log("Data loaded successfully!");
        } catch (e) { console.error("Data Load Error", e); }
    }

    function showSubCategories(mainCat) {
        let subs = [];
        let lastMainCat = "";
        
        allRows.forEach(row => {
            // Agar cell khaali hai toh pichla wala uthao
            let currentMain = row.c[2]?.v || lastMainCat;
            let currentSub = row.c[3]?.v;
            
            if (currentMain) lastMainCat = currentMain;

            if (currentMain === mainCat && currentSub) {
                if (!subs.includes(currentSub)) subs.push(currentSub);
            }
        });

        let html = '';
        subs.forEach(s => {
            html += `<div class="card" onclick="showProducts('${mainCat}', '${s}')"><i class="fas fa-folder-open"></i><h3>${s}</h3></div>`;
        });
        document.getElementById('sub-grid').innerHTML = html || '<p style="text-align:center; grid-column:span 2;">Data check karein...</p>';
        document.getElementById('sub-head').innerText = mainCat;
        openView('view-sub');
    }

    function showProducts(mainCat, subCat) {
        let html = '';
        let lastMainCat = "";
        let lastSubCat = "";
        let lastImg = "";

        allRows.forEach(row => {
            let currentMain = row.c[2]?.v || lastMainCat;
            let currentSub = row.c[3]?.v || lastSubCat;
            let currentImg = row.c[6]?.v || lastImg;

            if (currentMain) lastMainCat = currentMain;
            if (currentSub) lastSubCat = currentSub;
            if (currentImg) lastImg = currentImg;

            if (currentMain === mainCat && currentSub === subCat) {
                const name = row.c[1]?.v || lastSubCat;
                const weight = row.c[4]?.v;
                const price = row.c[5]?.v;
                const status = row.c[7]?.v || 'Live'; // Agar Status khaali hai toh Live maano

                if(status === 'Live' && weight && price) {
                    html += `
                        <div class="item-row">
                            <img src="${currentImg || 'https://via.placeholder.com/60'}">
                            <div class="item-info">
                                <h4>${name} (${weight})</h4>
                                <div class="price-tag">₹${price}</div>
                            </div>
                            <button class="order-btn" onclick="sendWhatsApp('${name}', '${weight}', '${price}')">Order</button>
                        </div>`;
                }
            }
        });
        document.getElementById('product-list').innerHTML = html || '<p>Out of Stock</p>';
        document.getElementById('prod-head').innerText = subCat;
        document.getElementById('back-to-sub').onclick = () => showSubCategories(mainCat);
        openView('view-products');
    }

    function sendWhatsApp(name, weight, price) {
        const msg = `Namaste Rana Ji,\nMujhe order karna hai:\n*Saman:* ${name}\n*Weight:* ${weight}\n*Price:* ₹${price}`;
        window.open(`https://wa.me/918923357537?text=${encodeURIComponent(msg)}`);
    }

    window.onload = loadSheetData;
</script>
