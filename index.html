<script>
const SID = '15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx';
const URL = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=Products`;

let data = [];
let cart = [];

async function init() {
    try {
        const r = await fetch(URL);
        const t = await r.text();
        const j = JSON.parse(t.substring(47, t.length - 2));
        data = j.table.rows;
        console.log("Sheet Loaded!");
    } catch(e) { alert("Net Check Karein!"); }
}

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'view-cart') renderCart();
}

// 2. Sub Category Load (Yahan logic alag kiya hai)
function loadSubs(main) {
    let subs = {};
    let lastM = "";
    data.forEach(r => {
        let m = r.c[2]?.v || lastM; if(m) lastM = m;
        let curM = lastM.toLowerCase().trim();
        let tarM = main.toLowerCase().trim();

        // Check if Category matches
        let match = (curM === tarM) || (tarM === 'masale' && (curM.includes('mirch') || curM.includes('hald') || curM.includes('masal') || curM.includes('jeera') || curM.includes('saunf')));
        
        if(match) {
            // AGAR MASALE HAI TO COLUMN B (NAME) KA BUTTON BANAO
            // AGAR AATA/OIL HAI TO COLUMN D (SUB-CATEGORY) KA BUTTON BANAO
            let buttonName = (tarM === 'masale') ? r.c[1]?.v : r.c[3]?.v;
            let img = r.c[6]?.v;
            if(buttonName && !subs[buttonName]) subs[buttonName] = img;
        }
    });

    let h = '';
    for(let s in subs) {
        let img = (subs[s] && subs[s].includes('http')) ? subs[s] : 'https://cdn-icons-png.flaticon.com/512/3081/3081913.png';
        h += `<div class="card" onclick="loadProds('${main}','${s}')"><img src="${img}"><h3>${s}</h3></div>`;
    }
    document.getElementById('list-sub').innerHTML = h || "No Categories Found";
    document.getElementById('title-sub').innerText = main;
    showView('view-sub');
}

// 3. Products Load
function loadProds(main, subOrItem) {
    let h = '';
    let lM="", lN="", lS="", lI="";
    data.forEach(r => {
        let n = r.c[1]?.v || lN; if(n) lN=n;
        let m = r.c[2]?.v || lM; if(m) lM=m;
        let s = r.c[3]?.v || lS; if(s) lS=s;
        let i = r.c[6]?.v || lI; if(i && i.includes('http')) lI=i;

        let curM = lM.toLowerCase().trim();
        let tarM = main.toLowerCase().trim();
        
        let match = false;
        if(tarM === 'masale') {
            // Masale mein hum Item Name (Mirch, Haldi) se match kar rahe hain
            if(lN === subOrItem) match = true;
        } else {
            // Aata/Oil mein hum purane tarike se Sub-Category se match kar rahe hain
            if(curM === tarM && lS === subOrItem) match = true;
        }

        if(match) {
            let w = r.c[4]?.v; let p = r.c[5]?.v;
            if(w && p) {
                // Masale ke liye display thoda badal diya (e.g., "Pisa (Mirch)")
                let dName = (tarM === 'masale') ? `${lS} (${lN})` : lN;
                h += `<div class="item-row"><img src="${lI || 'https://via.placeholder.com/50'}"><div style="flex:1"><b>${dName}</b><br><small>${w} - ₹${p}</small></div><button class="add-btn" onclick="add('${dName}','${w}','${p}')">Add +</button></div>`;
            }
        }
    });
    document.getElementById('list-prod').innerHTML = h || "No Items";
    document.getElementById('title-prod').innerText = subOrItem;
    document.getElementById('back-to-sub').onclick = () => loadSubs(main);
    showView('view-prod');
}

function add(n,w,p) {
    cart.push({n,w,p:parseInt(p)});
    document.getElementById('b-count').innerText = cart.length;
    alert(n + " add ho gaya!");
}

function renderCart() {
    let h = '', t = 0;
    cart.forEach((x, i) => {
        t += x.p;
        h += `<div class="item-row"><div style="flex:1"><b>${x.n}</b> (${x.w})<br>₹${x.p}</div><button onclick="remove(${i})" style="color:red;border:none;background:none;">X</button></div>`;
    });
    document.getElementById('list-cart').innerHTML = h || "Cart Khali Hai";
    document.getElementById('total-cart').innerText = "Total: ₹" + t;
}

function remove(i) { cart.splice(i,1); document.getElementById('b-count').innerText = cart.length; renderCart(); }

function orderNow() {
    if(cart.length === 0) return;
    let msg = "*Naya Order - Rana Ji Aata Chakki*\n\n";
    cart.forEach(x => msg += `- ${x.n} (${x.w}): ₹${x.p}\n`);
    msg += `\n*Total: ₹${cart.reduce((a,b)=>a+b.p,0)}*`;
    window.open(`https://wa.me/918923357537?text=${encodeURIComponent(msg)}`);
}

window.onload = init;
</script>
