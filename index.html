<script>
    const S_ID = '15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx';
    const G_URL = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json&sheet=Products`;

    let sheetData = [];
    let cart = [];

    async function init() {
        try {
            const r = await fetch(G_URL);
            const t = await r.text();
            const j = JSON.parse(t.substring(47, t.length - 2));
            sheetData = j.table.rows;
            console.log("Data loaded successfully");
        } catch(e) { console.error("Load Error"); }
    }

    function openView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-cart') renderCart();
    }

    function processSub(main) {
        let subs = {};
        let lastM = "";
        
        sheetData.forEach(row => {
            let m = row.c[2]?.v || lastM;
            if(m) lastM = m;

            let isMatch = false;
            let currentCat = lastM.toString().toLowerCase().trim();
            let searchCat = main.toLowerCase().trim();

            // Specially for Masale: check if category is mirchi, haldi, masala or masale
            if(searchCat === 'masale') {
                if(currentCat === 'masale' || currentCat === 'masala' || currentCat === 'mirchi' || currentCat === 'haldi') {
                    isMatch = true;
                }
            } else {
                if(currentCat.includes(searchCat.substring(0,3))) isMatch = true;
            }

            if(isMatch) {
                let s = row.c[3]?.v; // Sub-Category (Pisi, Sabut)
                let img = row.c[6]?.v; 
                if(s && !subs[s]) subs[s] = img;
            }
        });

        let h = '';
        for(let s in subs) {
            let imgSrc = (subs[s] && subs[s].includes('http')) ? subs[s] : 'https://cdn-icons-png.flaticon.com/512/3233/3233959.png';
            h += `<div class="card" onclick="processProd('${main}','${s}')">
                    <img src="${imgSrc}" style="width:100%; height:100px; object-fit:cover; border-radius:10px;">
                    <h3>${s}</h3>
                  </div>`;
        }
        document.getElementById('sub-grid').innerHTML = h || `<p style="text-align:center; padding:20px;">Saman nahi mila. Sheet mein Category check karein.</p>`;
        document.getElementById('sub-head').innerText = main;
        openView('view-sub');
    }

    function processProd(main, sub) {
        let h = '';
        let lastM="", lastS="", lastI="", lastN="";
        
        sheetData.forEach(row => {
            let m = row.c[2]?.v || lastM; if(m) lastM=m;
            let s = row.c[3]?.v || lastS; if(s) lastS=s;
            let n = row.c[1]?.v || lastN; if(n) lastN=n;
            let i = row.c[6]?.v || lastI; if(i && i.includes('http')) lastI=i;

            let isMatch = false;
            let currentCat = lastM.toString().toLowerCase().trim();
            let searchCat = main.toLowerCase().trim();

            if(searchCat === 'masale') {
                if(currentCat === 'masale' || currentCat === 'masala' || currentCat === 'mirchi' || currentCat === 'haldi') isMatch = true;
            } else {
                if(currentCat.includes(searchCat.substring(0,3))) isMatch = true;
            }

            if(isMatch && s === sub) {
                let w = row.c[4]?.v;
                let p = row.c[5]?.v;
                if(w && p) {
                    h += `<div class="item-row" style="display:flex; align-items:center; gap:10px; margin-bottom:10px; background:white; padding:10px; border-radius:10px;">
                            <img src="${lastI || 'https://via.placeholder.com/60'}" style="width:60px; height:60px; border-radius:5px;">
                            <div style="flex:1">
                                <h4>${lastN}</h4>
                                <p>${w} - ₹${p}</p>
                            </div>
                            <button class="add-cart-btn" onclick="add('${lastN}','${w}','${p}')" style="background:#f4b41a; border:none; padding:8px; border-radius:5px; font-weight:bold;">Add +</button>
                          </div>`;
                }
            }
        });
        document.getElementById('product-list').innerHTML = h || "No Products Found";
        document.getElementById('prod-head').innerText = sub;
        document.getElementById('btn-back-prod').onclick = () => processSub(main);
        openView('view-products');
    }

    function add(n,w,p) {
        cart.push({n,w,p:parseInt(p)});
        document.getElementById('badge').innerText = cart.length;
        alert(n + " Cart mein add ho gaya!");
    }

    function renderCart() {
        let h = '', t = 0;
        cart.forEach((item, i) => {
            t += item.p;
            h += `<div class="item-row" style="display:flex; justify-content:space-between; background:white; padding:10px; margin-bottom:5px; border-radius:10px;">
                    <div><h4>${item.n} (${item.w})</h4><b>₹${item.p}</b></div>
                    <button onclick="remove(${i})" style="color:red; border:none; background:none; font-weight:bold;">X</button>
                  </div>`;
        });
        document.getElementById('cart-items').innerHTML = h || "Cart khaali hai";
        document.getElementById('cart-total').innerHTML = `<h3>Total: ₹${t}</h3>`;
    }

    function remove(i) { cart.splice(i,1); document.getElementById('badge').innerText = cart.length; renderCart(); }

    function sendToWA() {
        if(cart.length === 0) return alert("Pehle saman add karein!");
        let msg = "*Naya Order - Rana Ji*\n\n";
        cart.forEach((item, i) => msg += `${i+1}. ${item.n} (${item.w}) - ₹${item.p}\n`);
        msg += `\n*Total: ₹${cart.reduce((a,b)=>a+b.p,0)}*`;
        window.open(`https://wa.me/918923357537?text=${encodeURIComponent(msg)}`);
    }

    window.onload = init;
</script>
