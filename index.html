<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rana Ji VIP</title>
    <link rel="stylesheet" href="https://ranaji-vip.github.io/app/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="toast"></div>

<div id="login-screen" class="full-screen">
    <h2>Namaste Rana Ji VIP! 🙏</h2>
    <input type="text" id="l-name" placeholder="Pura Naam">
    <input type="number" id="l-mobile" placeholder="Mobile Number">
    <input type="text" id="l-address" placeholder="Address">
    <button class="submit-btn" onclick="handleLogin()">Login</button>
</div>

<div class="header"><b>RANA JI AATA CHAKKI</b></div>

<div id="view-home" class="view active">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
        <div class="item-card" onclick="loadSubs('Aata')"><b>Aata</b></div>
        <div class="item-card" onclick="loadSubs('Mustered oil')"><b>Oil</b></div>
        <div class="item-card" onclick="loadSubs('Masale')"><b>Masale</b></div>
    </div>
</div>

<div id="view-sub" class="view"><div id="sub-list"></div></div>
<div id="view-prod" class="view"><div id="prod-list"></div></div>
<div id="view-cart" class="view">
    <div id="cart-items-display"></div>
    <div id="cart-total-display"></div>
    <button class="submit-btn" onclick="confirmOrder()">Confirm Order</button>
</div>
<div id="view-profile" class="view">
    <div id="order-history"></div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showPage('view-home')">Home</div>
    <div class="nav-item" onclick="showPage('view-cart')">Bag</div>
    <div class="nav-item" onclick="showPage('view-profile')">Profile</div>
</div>

<script src="https://ranaji-vip.github.io/app/script.js"></script>

</body>
</html>
