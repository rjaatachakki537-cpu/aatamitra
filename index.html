<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rana Ji Aata Chakki</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #f4b41a; --dark: #4a2c2a; --bg: #fffbf0; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); padding-bottom: 90px; }
        .header { background: var(--dark); color: var(--main); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .view { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 10px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; background: #eee; }
        .card i { font-size: 35px; color: var(--main); margin: 10px 0; display: block; }
        .card h3 { margin: 5px 0; font-size: 15px; color: var(--dark); }

        /* Items */
        .item-row { background: white; border-radius: 15px; padding: 12px; margin-bottom: 12px; display: flex; gap: 15px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .item-row img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; background: #eee; }
        .item-info { flex: 1; }
        .item-info h4 { margin: 0; font-size: 14px; }
        .price-tag { font-weight: bold; color: #2e7d32; font-size: 16px; }
        
        .add-cart-btn { background: var(--main); color: var(--dark); border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .whatsapp-btn { background: #25d366; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 20px; }
        
        .back-btn { background: none; border: none; font-weight: bold; font-size: 16px; color: var(--dark); cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--main); z-index: 1000; }
        .nav-item { text-align: center; color: #888; text-decoration: none; font-size: 11px; flex: 1; position: relative; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active-nav { color: var(--dark); font-weight: bold; }
        .cart-count { position: absolute; top: -5px; right: 20%; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header"><h2 style="margin:0; font-size: 18px;">Rana Ji Aata Chakki</h2></div>

<div id="view-home" class="view active">
    <div class="grid">
        <div class="card" onclick="showSubCategories('Aata')"><i class="fas fa-wheat-awn"></i><h3>Aata</h3></div>
        <div class="card" onclick="showSubCategories('Mustered oil')"><i class="fas fa-oil-can"></i><h3>Mustard Oil</h3></div>
        <div class="card" onclick="showSubCategories('Masale')"><i class="fas fa-pepper-hot"></i><h3>Masale</h3></div>
        <div class="card" onclick="window.open('tel:+918923357537')"><i class="fas fa-phone"></i><h3>Contact Us</h3></div>
    </div>
</div>

<div id="view-sub" class="view">
    <button class="back-btn" onclick="openView('view-home')"><i class="fas fa-chevron-left"></i> Back</button>
    <h3 id="sub-head">Sub Category</h3>
    <div id="sub-grid" class="grid"></div>
</div>

<div id="view-products" class="view">
    <button class="back-btn" id="back-to-sub"><i class="fas fa-chevron-left"></i> Back</button>
    <h3 id="prod-head">Products</h3>
    <div id="product-list"></div>
</div>

<div id="view-cart" class="view">
    <h3>Mera Cart (Saman ki List)</h3>
    <div id="cart-items-list"></div>
    <div id="cart-total" style="text-align: right; font-weight: bold; margin: 15px 0;"></div>
    <button class="whatsapp-btn" onclick="sendCartToWhatsApp()">
        <i class="fab fa-whatsapp"></i> WhatsApp par Order Karein
    </button>
</div>

<div class="bottom-nav">
    <a href="javascript:void(0)" class="nav-item active-nav" onclick="openView('view-home')"><i class="fas fa-home"></i>Home</a>
    <a href="javascript:void(0)" class="nav-item" onclick="alert('Profile saving feature coming soon!')"><i class="fas fa-user"></i>Profile</a>
    <a href="javascript:void(0)" class="nav-item" onclick="openView('view-cart')">
        <i class="fas fa-shopping-cart"></i>Cart
        <span class="cart-count" id="cart-badge">0</span>
    </a>
</div>

<script>
    const SHEET_ID = '15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx'; 
    const G_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Products`;

    let allRows = [];
    let cart = [];

    async function loadSheetData() {
        try {
            const res = await fetch(G_URL);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            allRows = json.table.rows;
            console.log("Sheet Loaded!");
        } catch(e) { console.log("Load error"); }
    }

    function openView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-cart') renderCart();
    }

    function showSubCategories(mainCat) {
        let subs = [];
        let subImages = {};
        let lastMain = "";
        
        allRows.forEach(row => {
            let m = row.c[2]?.v || lastMain;
            if(m) lastMain = m;

            // Spelling check ko easy banaya (Aata aur Atta dono chalenge)
            if (m && m.toLowerCase().includes(mainCat.toLowerCase().substring(0,3))) {
                let s = row.c[3]?.v;
                let img = row.c[6]?.v;
                if (s && !subs.includes(s)) {
                    subs.push(s);
                    subImages[s] = img;
                }
            }
        });

        let html = '';
        subs.forEach(s => {
            let imgSrc = subImages[s] || 'https://via.placeholder.com/150?text=Rana+Ji';
            html += `
            <div class="card" onclick="showProducts('${mainCat}', '${s}')">
                <img src="${imgSrc}">
                <h3>${s}</h3>
            </div>`;
        });
        
        document.getElementById('sub-grid').innerHTML = html || '<p>Saman load ho raha hai...</p>';
        document.getElementById('sub-head').innerText = mainCat;
        openView('view-sub');
    }

    function showProducts(mainCat, subCat) {
        let html = '';
        let lastMain = "", lastSub = "", lastImg = "", lastName = "";

        allRows.forEach(row => {
            let m = row.c[2]?.v || lastMain;
            let s = row.c[3]?.v || lastSub;
            let n = row.c[1]?.v || lastName;
            let i = row.c[6]?.v || lastImg;

            if (m) lastMain = m;
            if (s) lastSub = s;
            if (n) lastName = n;
            if (i && i.includes('http')) lastImg = i;

            if (m && m.toLowerCase().includes(mainCat.toLowerCase().substring(0,3)) && s === subCat) {
                const weight = row.c[4]?.v;
                const price = row.c[5]?.v;
                if(weight && price) {
                    html += `
                        <div class="item-row">
                            <img src="${lastImg || 'https://via.placeholder.com/100'}">
                            <div class="item-info">
                                <h4>${lastName}</h4>
                                <p>Size: ${weight} | ₹${price}</p>
                            </div>
                            <button class="add-cart-btn" onclick="addToCart('${lastName}', '${weight}', '${price}')">Add +</button>
                        </div>`;
                }
            }
        });
        document.getElementById('product-list').innerHTML = html;
        document.getElementById('prod-head').innerText = subCat;
        document.getElementById('back-to-sub').onclick = () => showSubCategories(mainCat);
        openView('view-products');
    }

    function addToCart(name, weight, price) {
        cart.push({ name, weight, price: parseInt(price) });
        updateCartBadge();
        // Chota sa toast message (optional alert)
        alert(name + " Cart mein add hua!");
    }

    function updateCartBadge() {
        document.getElementById('cart-badge').innerText = cart.length;
    }

    function renderCart() {
        let html = '';
        let total = 0;
        cart.forEach((item, index) => {
            total += item.price;
            html += `
                <div class="item-row">
                    <div class="item-info">
                        <h4>${item.name} (${item.weight})</h4>
                        <div class="price-tag">₹${item.price}</div>
                    </div>
                    <button onclick="removeFromCart(${index})" style="background:red; color:white; border:none; padding:8px; border-radius:5px;">Hataein</button>
                </div>`;
        });
        document.getElementById('cart-items-list').innerHTML = html || '<p style="text-align:center;">Cart khaali hai!</p>';
        document.getElementById('cart-total').innerText = "Total Payable: ₹" + total;
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
        updateCartBadge();
    }

    function sendCartToWhatsApp() {
        if(cart.length === 0) return alert("Pehle saman add karein!");
        let list = "Namaste Rana Ji, mera order niche hai:\n\n";
        let total = 0;
        cart.forEach((item, i) => {
            list += `${i+1}. *${item.name}* (${item.weight}) - ₹${item.price}\n`;
            total += item.price;
        });
        list += `\n*Total Order: ₹${total}*`;
        window.open(`https://wa.me/918923357537?text=${encodeURIComponent(list)}`);
    }

    window.onload = loadSheetData;
</script>
</body>
</html>
