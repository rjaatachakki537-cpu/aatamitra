<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rana Ji Aata Chakki</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #2874f0; --yellow: #f4b41a; --bg: #f1f3f6; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); padding-bottom: 70px; }
        .header { background: var(--main); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .banner { background: linear-gradient(45deg, #1e3c72, #2a5298); color: white; padding: 25px; margin: 10px; border-radius: 15px; text-align: center; }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .cat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item-row { background: white; padding: 10px; margin: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .item-row img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .view { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 10px; color: #666; font-size: 12px; }
        .nav-item.active { color: var(--main); font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #fb641b; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen" style="position:fixed; inset:0; background:white; z-index:10000; padding:25px;">
    <h2>Namaste! 🙏</h2>
    <input type="text" id="l-name" placeholder="Pura Naam">
    <input type="number" id="l-mobile" placeholder="Mobile Number">
    <button onclick="getLocation()" style="background:#e3f2fd; border:1px solid #1976d2; padding:10px; width:100%; margin-bottom:10px; border-radius:8px;">📍 Add Live Location</button>
    <input type="text" id="l-address" placeholder="Pura Address">
    <div id="otp-area" style="display:none;">
        <div id="u-otp-box" style="background:#fff3e0; padding:10px; margin-bottom:10px; border-radius:8px;">Login Code: <b id="show-otp"></b></div>
        <input type="number" id="i-otp" placeholder="Enter OTP">
    </div>
    <button class="btn" onclick="handleLogin()">Login Karein</button>
</div>

<div class="header"><b>RANA JI AATA CHAKKI</b></div>

<div id="view-home" class="view active">
    <div class="banner"><h3>100% Shuddh Maal</h3><p>Chakki Fresh Items</p></div>
    <div class="cat-grid">
        <div class="cat-card" onclick="loadSubs('Aata')"><i class="fas fa-wheat-awn" style="font-size:30px; color:var(--yellow);"></i><br>Aata</div>
        <div class="cat-card" onclick="loadSubs('Mustered oil')"><i class="fas fa-droplet" style="font-size:30px; color:var(--yellow);"></i><br>Oil</div>
        <div class="cat-card" onclick="loadSubs('Masale')"><i class="fas fa-pepper-hot" style="font-size:30px; color:var(--yellow);"></i><br>Masale</div>
        <div class="cat-card" onclick="window.open('tel:8923357537')"><i class="fas fa-phone" style="font-size:30px; color:var(--main);"></i><br>Support</div>
    </div>
</div>

<div id="view-sub" class="view"><button onclick="showView('view-home')" style="border:none; padding:10px;">← Back</button><div id="list-sub" class="cat-grid"></div></div>
<div id="view-prod" class="view"><button id="back-to-sub" style="border:none; padding:10px;">← Back</button><div id="list-prod"></div></div>

<div id="view-cart" class="view">
    <h3 style="padding:15px;">Mera Bag</h3>
    <div id="list-cart"></div>
    <div style="padding:15px; background:white;"><button class="btn" onclick="processOrder()">Confirm Order</button></div>
</div>

<div id="view-profile" class="view">
    <div style="background:white; padding:20px; border-bottom:1px solid #ddd;"><b>Account: </b><span id="p-name"></span></div>
    <div id="my-orders" style="padding:15px;"></div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showView('view-home')"><i class="fas fa-home"></i><br>Home</div>
    <div class="nav-item" onclick="showView('view-cart')"><i class="fas fa-shopping-cart"></i><br>Cart</div>
    <div class="nav-item" onclick="showView('view-profile')"><i class="fas fa-user"></i><br>Profile</div>
</div>

<script>
const SID = '15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx';
const WID = 'TERA_URL_YAHAN';
const URL = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=Products`;
let data = [], cart = [], currentUser = JSON.parse(localStorage.getItem('ranaUser')), genOtp = null, userLoc = "";

async function init() {
    if(currentUser) {
        document.getElementById('login-screen').style.display='none';
        document.getElementById('p-name').innerText = currentUser.name;
    }
    const r = await fetch(URL); const t = await r.text();
    data = JSON.parse(t.substring(47, t.length-2)).table.rows;
}

function getLocation() {
    navigator.geolocation.getCurrentPosition(p => {
        userLoc = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
        alert("Location Saved!");
    });
}

async function handleLogin() {
    let n = document.getElementById('l-name').value, m = document.getElementById('l-mobile').value;
    if(m === "8923357537") { // Admin
        if(!genOtp) { 
            genOtp="WAIT"; await fetch(WID, {method:'POST', body:JSON.stringify({type:'get_admin_otp'})});
            document.getElementById('otp-area').style.display='block';
            document.getElementById('u-otp-box').innerText="OTP GMAIL PAR GAYA";
        } else { /* Admin Verify Logic */ }
    } else { // User
        if(!genOtp) {
            genOtp = Math.floor(1000+Math.random()*9000);
            document.getElementById('show-otp').innerText = genOtp;
            document.getElementById('otp-area').style.display='block';
        } else {
            if(document.getElementById('i-otp').value == genOtp) {
                currentUser = {name:n, mobile:m, address: document.getElementById('l-address').value + " Map: " + userLoc};
                localStorage.setItem('ranaUser', JSON.stringify(currentUser));
                location.reload();
            }
        }
    }
}

function loadSubs(main) {
    let subs = {}; let lastM = "";
    data.forEach(r => {
        let m = r.c[2]?.v || lastM; if(m) lastM = m;
        if(lastM.toLowerCase().includes(main.toLowerCase().substring(0,3))) {
            let b = (main === 'Masale') ? r.c[1]?.v : r.c[3]?.v;
            if(b && !subs[b]) subs[b] = r.c[6]?.v || "";
        }
    });
    let h = '';
    for(let s in subs) h += `<div class="cat-card" onclick="loadProds('${main}','${s}')"><img src="${subs[s]}" style="width:100%;height:60px;object-fit:cover;border-radius:10px;"><br>${s}</div>`;
    document.getElementById('list-sub').innerHTML = h; showView('view-sub');
}

function loadProds(main, sub) {
    let h = ''; let lM="", lN="", lS="", lI="";
    data.forEach(r => {
        let n=r.c[1]?.v||lN; lN=n; let m=r.c[2]?.v||lM; lM=m; let s=r.c[3]?.v||lS; lS=s; let i=r.c[6]?.v||lI; lI=i;
        let match = (main==='Masale')?(lN===sub):(lM.includes(main.substring(0,3)) && lS===sub);
        if(match && r.c[4]?.v) h+=`<div class="item-row"><img src="${lI}"><div><b>${lN}</b><br>${r.c[4].v} - ₹${r.c[5].v}</div><button onclick="add('${lN}','${r.c[4].v}','${r.c[5].v}')" style="margin-left:auto; background:var(--yellow); border:none; padding:5px 10px; border-radius:5px;">ADD</button></div>`;
    });
    document.getElementById('list-prod').innerHTML = h; showView('view-prod');
    document.getElementById('back-to-sub').onclick = () => loadSubs(main);
}

function add(n,w,p) { cart.push({n,w,p:parseInt(p)}); alert(n+" added!"); }

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function processOrder() {
    let items = cart.map(x => `${x.n}(${x.w})`).join(", ");
    let total = cart.reduce((s,x)=>s+x.p,0);
    await fetch(WID, {method:'POST', mode:'no-cors', body:JSON.stringify({name:currentUser.name, mobile:currentUser.mobile, address:currentUser.address, details:items, total:total})});
    alert("Order Sent!"); cart=[]; showView('view-home');
}

window.onload = init;
</script>
</body>
</html>
