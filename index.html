<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aata Mitra</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d35400">
    <link rel="apple-touch-icon" href="welcome.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://rjaatachakki537-cpu.github.io/aatamitra/style.css">
</head>
<body>

<div id="splash-screen">
   <img src="welcome.jpg" id="splash-img" alt="Welcome">
    <h2>Aata Mitra</h2>
    <p>Shuddhata Ka Vishwas...</p>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        Namaste, Mitra!
        <span onclick="toggleMenu()">&times;</span>
    </div>
    <div class="sidebar-links">
        <div onclick="showPage('view-home'); toggleMenu()"><i class="fas fa-home"></i> Home</div>
        <div onclick="handleNavBag(); toggleMenu()"><i class="fas fa-shopping-bag"></i> Mera Bag</div>
        <div onclick="showPage('view-profile'); toggleMenu()"><i class="fas fa-user-circle"></i> My Profile</div>
        <hr>
        <div id="menu-install-btn" onclick="installApp()">
            <i class="fas fa-download"></i> Install App
        </div>
        <div onclick="window.open('https://wa.me/918923357537')"><i class="fab fa-whatsapp"></i> Help & Support</div>
    </div>
</div>
<div id="sidebar-overlay" onclick="toggleMenu()"></div>

<div id="toast"></div>

<div id="login-screen" class="full-screen">
    <h2>Namaste Aata Mitra! 🙏</h2>
    <p>Apni details bhariye shuru karne ke liye</p>
    <input type="text" id="l-name" placeholder="Pura Naam">
    <div class="input-group">
        <input type="number" id="l-mobile" placeholder="WhatsApp Number">
        <button onclick="sendOTP()">Get OTP</button>
    </div>
    <div id="otp-section" style="display:none;">
        <input type="number" id="l-otp" placeholder="Enter 4 Digit OTP">
    </div>
    <input type="email" id="l-email" placeholder="Email (Notification ke liye)">
    <div class="input-group">
        <input type="text" id="l-address" placeholder="Pura Address ya Location">
        <button onclick="getMyLocation()"><i class="fas fa-location-arrow"></i></button>
    </div>
    <button class="submit-btn" onclick="verifyOTP()">LOGIN KAREIN</button>
</div>

<div class="header">
    <i class="fas fa-bars" onclick="toggleMenu()"></i>
    <b onclick="checkSuperAdmin()">AATA MITRA</b>
    <i class="fas fa-bell"></i>
</div>

<div id="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Aata, Masale ya Tel dhundhein...">
    </div>
</div>

<div id="view-home" class="view active">
    <h3>Hamari Services</h3>
    <div class="category-grid">
        <div class="cat-card" onclick="loadSubs('Aata')">
            <i class="fas fa-wheat-awn"></i><b>Aata</b>
        </div>
        <div class="cat-card" onclick="loadSubs('Mustered oil')">
            <i class="fas fa-droplet"></i><b>Oil</b>
        </div>
        <div class="cat-card" onclick="loadSubs('Masale')">
            <i class="fas fa-mortar-pestle"></i><b>Masale</b>
        </div>
    </div>
</div>

<div id="view-sub" class="view">
    <button class="back-btn" onclick="showPage('view-home')"><i class="fas fa-arrow-left"></i> BACK</button>
    <div id="sub-list" class="grid-2"></div>
</div>

<div id="view-prod" class="view">
    <button class="back-btn" onclick="showPage('view-sub')"><i class="fas fa-arrow-left"></i> BACK</button>
    <div id="prod-list"></div>
</div>

<div id="view-cart" class="view">
    <h3><i class="fas fa-shopping-bag"></i> Mera Bag</h3>
    <div id="cart-items-display"></div>
    <div id="cart-total-display">Total: ₹0</div>
    <textarea id="order-custom-note" placeholder="Koi extra message?"></textarea>
    <button class="submit-btn" onclick="confirmOrder()">ORDER CONFIRM KAREIN</button>
</div>

<div id="view-profile" class="view">
    <div class="profile-card">
        <div class="user-img-container">
            <img id="user-img-display" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <label for="img-input" class="cam-icon"><i class="fas fa-camera"></i></label>
            <input type="file" id="img-input" accept="image/*" onchange="updateProfilePic(this)">
        </div>
        <h3 id="p-name" onclick="checkAdminAccess()">Customer</h3>
        <p id="p-phone"></p>
        <button class="edit-btn" onclick="toggleEditMode()"><i class="fas fa-user-edit"></i> Edit Details</button>
        
        <div id="edit-form" style="display:none;">
            <input type="text" id="e-name" placeholder="Naya Naam">
            <input type="number" id="e-mobile" placeholder="Naya Number">
            <textarea id="e-address" placeholder="Naya Address"></textarea>
            <button class="submit-btn" onclick="saveProfileChanges()">SAVE</button>
        </div>
    </div>
    <h4><i class="fas fa-history"></i> Purane Orders</h4>
    <div id="order-history"></div>
    <button class="logout-btn" onclick="localStorage.clear(); location.reload();">LOGOUT</button>
</div>

<div class="nav">
    <div class="nav-item active" id="nav-home" onclick="showPage('view-home')">
        <i class="fas fa-home"></i><span>Home</span>
    </div>
    <div class="nav-item" id="nav-bag" onclick="handleNavBag()">
        <i class="fas fa-shopping-basket"></i><span>Bag</span>
    </div>
    <div class="nav-item" id="nav-profile" onclick="showPage('view-profile')">
        <i class="fas fa-user-circle"></i><span>Profile</span>
    </div>
</div>

<script src="https://rjaatachakki537-cpu.github.io/aatamitra/auth.js"></script>
<script src="https://rjaatachakki537-cpu.github.io/aatamitra/tracking.js"></script>
<script src="https://rjaatachakki537-cpu.github.io/aatamitra/splash.js"></script>
<script src="https://rjaatachakki537-cpu.github.io/aatamitra/admin.js"></script>
<script src="https://rjaatachakki537-cpu.github.io/aatamitra/script.js"></script>

</body>
</html>
