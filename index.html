<script>
    const S_ID = '15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx';
    const G_URL = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json&sheet=Products`;

    let sheetData = [];
    let cart = [];

    async function init() {
        try {
            const r = await fetch(G_URL);
            const t = await r.text();
            const j = JSON.parse(t.substring(47, t.length - 2));
            sheetData = j.table.rows;
            console.log("Sheet Connected!");
        } catch(e) { alert("Sheet Link ya Internet Check Karein!"); }
    }

    function openView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-cart') renderCart();
    }

    // YEH FUNCTION SUB-CATEGORY (SABUT / PISI) DIKHAYEGA
    function processSub(mainCat) {
        let subs = {};
        let lastC = ""; // Category (Aata/Masale)
        
        sheetData.forEach(row => {
            let c = row.c[2]?.v || lastC; // Column C
            if(c) lastC = c;

            // Spelling check: Aata, Masale, Mustered oil
            if (lastC.toLowerCase().trim().includes(mainCat.toLowerCase().substring(0,3))) {
                let s = row.c[3]?.v; // Column D (Sub Category)
                let img = row.c[6]?.v; // Column G (Image)
                if(s && !subs[s]) subs[s] = img;
            }
        });

        let h = '';
        for(let s in subs) {
            let imgSrc = (subs[s] && subs[s].includes('http')) ? subs[s] : 'https://cdn-icons-png.flaticon.com/512/3081/3081913.png';
            h += `
            <div class="card" onclick="processProd('${mainCat}','${s}')">
                <img src="${imgSrc}">
                <h3>${s}</h3>
            </div>`;
        }
        document.getElementById('sub-grid').innerHTML = h || `<p>Saman jaldi aayega!</p>`;
        document.getElementById('sub-head').innerText = mainCat;
        openView('view-sub');
    }

    // YEH FUNCTION SARE PRODUCTS (MIRCHI, HALDI) EK SAATH DIKHAYEGA
    function processProd(mainCat, subCat) {
        let h = '';
        let lastB="", lastC="", lastD="", lastI="";

        sheetData.forEach(row => {
            let n = row.c[1]?.v || lastB; if(n) lastB=n; // Name
            let c = row.c[2]?.v || lastC; if(c) lastC=c; // Category
            let s = row.c[3]?.v || lastD; if(s) lastD=s; // Sub-Cat
            let i = row.c[6]?.v || lastI; if(i && i.includes('http')) lastI=i; // Image

            // Match Category and Sub-category
            if(lastC.toLowerCase().trim().includes(mainCat.toLowerCase().substring(0,3)) && s === subCat) {
                let w = row.c[4]?.v; // Weight
                let p = row.c[5]?.v; // Price
                if(w && p) {
                    h += `
                    <div class="item-row">
                        <img src="${lastI || 'https://via.placeholder.com/60'}">
                        <div style="flex:1">
                            <h4>${lastB}</h4>
                            <p>${w} | ₹${p}</p>
                        </div>
                        <button class="add-cart-btn" onclick="add('${lastB}','${w}','${p}')">Add +</button>
                    </div>`;
                }
            }
        });
        document.getElementById('product-list').innerHTML = h;
        document.getElementById('prod-head').innerText = subCat;
        document.getElementById('btn-back-prod').onclick = () => processSub(mainCat);
        openView('view-products');
    }

    function add(n,w,p) {
        cart.push({n,w,p:parseInt(p)});
        document.getElementById('badge').innerText = cart.length;
        alert(n + " " + w + " Cart mein add ho gaya!");
    }

    function renderCart() {
        let h = '', t = 0;
        cart.forEach((item, i) => {
            t += item.p;
            h += `
            <div class="item-row">
                <div style="flex:1">
                    <h4>${item.n} (${item.w})</h4>
                    <b>₹${item.p}</b>
                </div>
                <button onclick="remove(${i})" style="color:red; border:none; background:none; font-weight:bold;">Hatao</button>
            </div>`;
        });
        document.getElementById('cart-items').innerHTML = h || "Cart khaali hai";
        document.getElementById('cart-total').innerText = "Total Payable: ₹" + t;
    }

    function remove(i) { cart.splice(i,1); document.getElementById('badge').innerText = cart.length; renderCart(); }

    function sendToWA() {
        if(cart.length === 0) return alert("Cart khaali hai!");
        let msg = "*Naya Order - Rana Ji Aata Chakki*\n--------------------------\n";
        cart.forEach((item, index) => {
            msg += `${index+1}. ${item.n} (${item.w}) - ₹${item.p}\n`;
        });
        msg += "--------------------------\n*Total Order Value: ₹" + cart.reduce((a,b) => a + b.p, 0) + "*";
        window.open(`https://wa.me/918923357537?text=${encodeURIComponent(msg)}`);
    }

    window.onload = init;
</script>
