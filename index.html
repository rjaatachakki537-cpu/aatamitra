<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rana Ji VIP | Order Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #2874f0; --yellow: #f4b41a; --bg: #f1f3f6; --red: #fb641b; --green: #25D366; --gray: #777; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); padding-bottom: 80px; overflow-x: hidden; }
        
        .header { background: var(--main); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .full-screen { position: fixed; inset: 0; background: white; z-index: 10000; padding: 25px; display: flex; flex-direction: column; }
        .view { display: none; padding: 10px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Status Colors */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; float: right; text-transform: uppercase; }
        .s-PENDING { background: #fff3e0; color: #ff9800; }
        .s-CONFIRMED { background: #e3f2fd; color: #1976d2; }
        .s-SHIPPING { background: #f3e5f5; color: #9c27b0; animation: blink 1s infinite; }
        .s-DELIVERED { background: #e8f5e9; color: #2e7d32; }
        .s-CANCELLED { background: #ffebee; color: #d32f2f; }
        
        @keyframes blink { 50% { opacity: 0.5; } }

        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 5px solid var(--main); box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .chat-btn { background: var(--green); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .repeat-btn { background: var(--yellow); color: #000; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .cancel-btn { background: #f4433615; color: #d32f2f; border: 1px solid #d32f2f; padding: 8px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 11px; }

        .item-card { background: white; padding: 12px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; gap: 12px; }
        .item-card img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; }
        .add-btn { background: var(--yellow); border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; margin-left: auto; cursor: pointer; }

        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 10001; left: 50%; bottom: 100px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadeinout 2s; }
        @keyframes fadeinout { 0%, 100% { opacity: 0; bottom: 50px; } 20%, 80% { opacity: 1; bottom: 100px; } }

        input, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .loc-btn { background: #e3f2fd; color: #1976d2; border: 1px dashed #1976d2; padding: 12px; border-radius: 10px; margin-bottom: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        .submit-btn { background: var(--red); color: white; border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 999; }
        .nav-item { flex: 1; text-align: center; padding: 12px; color: #888; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--main); font-weight: bold; }
        
        /* Admin Section Style */
        #admin-view { background: #f1f3f6; color: #333; height: 100vh; overflow-y: auto; display: none; padding: 20px; }
        .admin-card { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 5px solid #000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .admin-status-btn { padding: 8px; margin: 4px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="login-screen" class="full-screen">
    <h2 style="color:var(--main);">Namaste! 🙏</h2>
    <p>Apni detail bharein shuru karne ke liye</p>
    <input type="text" id="l-name" placeholder="Pura Naam">
    <input type="number" id="l-mobile" placeholder="Mobile Number">
    <button id="gps-button" class="loc-btn" onclick="askLocation()">
        <i class="fas fa-location-arrow"></i> <span id="loc-status">Allow Live Location</span>
    </button>
    <input type="text" id="l-address" placeholder="Ghar ka Pata (Address)">
    <div id="otp-box" style="display:none;">
        <div style="background:#fff3e0; padding:10px; text-align:center;">Login Code: <b id="display-otp" style="color:var(--red);"></b></div>
        <input type="number" id="i-otp" placeholder="Upar wala code daalein">
    </div>
    <button class="submit-btn" id="login-action-btn" onclick="handleLogin()">Aage Badhein</button>
</div>

<div class="header"><b onclick="adminCounter()">RANA JI AATA CHAKKI</b></div>

<div id="view-home" class="view active">
    <div style="background: linear-gradient(135deg,#1e3c72,#2a5298); color:white; padding:30px; border-radius:20px; text-align:center; margin-bottom:20px;">
        <h2 style="margin:0">Pure & Fresh</h2>
        <p>Seedha Chakki Se Aapke Ghar Tak</p>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
        <div style="background:white; padding:20px; border-radius:15px; text-align:center;" onclick="loadSubs('Aata')"><i class="fas fa-wheat-awn" style="color:var(--yellow); font-size:35px;"></i><br><b>Aata</b></div>
        <div style="background:white; padding:20px; border-radius:15px; text-align:center;" onclick="loadSubs('Mustered oil')"><i class="fas fa-droplet" style="color:var(--main); font-size:35px;"></i><br><b>Oil</b></div>
        <div style="background:white; padding:20px; border-radius:15px; text-align:center;" onclick="loadSubs('Masale')"><i class="fas fa-pepper-hot" style="color:var(--red); font-size:35px;"></i><br><b>Masale</b></div>
        <div style="background:white; padding:20px; border-radius:15px; text-align:center;" onclick="window.location.href='tel:8923357537'"><i class="fas fa-headset" style="color:green; font-size:35px;"></i><br><b>Support</b></div>
    </div>
</div>

<div id="view-sub" class="view">
    <button onclick="showPage('view-home')" style="border:none; padding:10px; background:none;">← BACK</button>
    <div id="sub-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;"></div>
</div>

<div id="view-prod" class="view">
    <button id="back-to-sub-btn" style="border:none; padding:10px; background:none;">← BACK</button>
    <div id="prod-list" style="margin-top:10px;"></div>
</div>

<div id="view-cart" class="view">
    <h3 style="margin-bottom:15px;">Mera Shopping Bag</h3>
    <div id="cart-items-display"></div>
    <div id="cart-total-display" style="font-weight:bold; font-size:20px; padding:20px 0; text-align:right;">Total: ₹0</div>
    <textarea id="order-custom-note" placeholder="Bhai ko kuch bolna hai? (Chat Box)"></textarea>
    <button class="submit-btn" onclick="confirmOrder()">Order Confirm Karein</button>
</div>

<div id="view-profile" class="view">
    <div style="background:white; padding:20px; border-radius:15px; border-left:5px solid var(--main);">
        <b id="p-name">Loading...</b><br>
        <span id="p-mob" style="color:#666;">+91 0000000000</span><br>
        <small id="p-addr" style="color:#888;"></small>
    </div>
    <h4 style="margin-top:25px;">Mere Pichle Orders <button onclick="syncStatuses()" style="float:right; border:none; background:none; color:var(--main); font-size:12px;"><i class="fas fa-sync"></i> Refresh</button></h4>
    <div id="order-history"></div>
    <button onclick="logout()" style="width:100%; margin-top:30px; border:none; color:gray; background:none;">Logout Account</button>
</div>

<div id="admin-view" class="view">
    <h3 style="color:var(--main);">Rana Ji Admin (Live Orders)</h3>
    <div id="admin-orders-list"></div>
    <button class="submit-btn" onclick="showPage('view-home')" style="margin-top:20px; background:#444;">Exit Admin</button>
</div>

<div class="nav">
    <div class="nav-item active" id="n-home" onclick="showPage('view-home')"><i class="fas fa-home"></i><br>Home</div>
    <div class="nav-item" id="n-cart" onclick="showPage('view-cart')"><i class="fas fa-shopping-basket"></i><br>Bag</div>
    <div class="nav-item" id="n-profile" onclick="showPage('view-profile')"><i class="fas fa-user-circle"></i><br>Profile</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwjnaS-3JK9xVrCoGXng_eafQs9Zs4XTrSpZ63AOEqwP-6MzWZuUkoWj16ea7GWlgAk/exec';
const DATA_URL = `https://docs.google.com/spreadsheets/d/15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx/gviz/tq?tqx=out:json&sheet=Products`;

let masterData = [], cart = [], user = JSON.parse(localStorage.getItem('ranaUser')), genOtp = null, userMapLink = "";
let historyData = JSON.parse(localStorage.getItem('ranaHistory')) || [];

async function init() {
    if(user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('p-name').innerText = user.name;
        document.getElementById('p-mob').innerText = "+91 " + user.mobile;
        document.getElementById('p-addr').innerText = user.address;
        syncStatuses();
    }
    const res = await fetch(DATA_URL);
    const text = await res.text();
    masterData = JSON.parse(text.substring(47, text.length-2)).table.rows;
    renderHistory();
}

async function syncStatuses() {
    if(!user) return;
    try {
        const res = await fetch(`${SCRIPT_URL}?mobile=${user.mobile}`);
        const liveOrders = await res.json();
        if(liveOrders.length > 0) {
            historyData = liveOrders;
            localStorage.setItem('ranaHistory', JSON.stringify(historyData));
            renderHistory();
        }
    } catch(e) { console.log("Sync Error"); }
}

function renderHistory() {
    let html = '';
    historyData.slice().reverse().forEach(o => {
        let sClass = "s-" + (o.status || 'PENDING');
        html += `<div class="order-card">
            <span class="status-badge ${sClass}">${o.status}</span>
            <b>ID: #${o.id.toString().slice(-6)}</b><br>
            <div style="font-size:13px; margin:8px 0;">${o.details || o.items}</div>
            <div style="font-weight:bold;">Total: ₹${o.total}</div>
        </div>`;
    });
    document.getElementById('order-history').innerHTML = html || "<p style='text-align:center;'>Bag khali hai.</p>";
}

// --- ADMIN FUNCTIONS ---
let clickCount = 0;
function adminCounter() { clickCount++; if(clickCount >= 5) { clickCount = 0; openAdmin(); } }

function openAdmin() {
    let pass = prompt("Enter Rana Ji Secret Pin:");
    if(pass === "1234") {
        showPage('admin-view');
        fetchAdminOrders();
    }
}

async function fetchAdminOrders() {
    showToast("Loading Orders... 🔄");
    const res = await fetch(SCRIPT_URL);
    const allOrders = await res.json();
    let html = '';
    allOrders.reverse().forEach(o => {
        html += `<div class="admin-card">
            <b>${o.name}</b> (${o.mobile})<br>
            <small>${o.address}</small><br>
            <p>${o.details} | <b>₹${o.total}</b></p>
            <div style="background:#eee; padding:5px; border-radius:5px; margin-bottom:5px;">Status: <b>${o.status}</b></div>
            <button class="admin-status-btn" style="background:blue" onclick="updateLiveStatus('${o.id}', 'CONFIRMED')">Confirm</button>
            <button class="admin-status-btn" style="background:orange" onclick="updateLiveStatus('${o.id}', 'OUT FOR DELIVERY')">Out</button>
            <button class="admin-status-btn" style="background:green" onclick="updateLiveStatus('${o.id}', 'DELIVERED')">Done</button>
        </div>`;
    });
    document.getElementById('admin-orders-list').innerHTML = html || "No orders.";
}

async function updateLiveStatus(id, newStatus) {
    showToast("Updating Sheet... 🚀");
    await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: "updateStatus", id: id, newStatus: newStatus })
    });
    showToast("Updated!");
    fetchAdminOrders();
}

async function confirmOrder() {
    if(!cart.length) return alert("Bag khali hai!");
    let id = Date.now();
    let details = cart.map(i => `${i.n}(${i.w})`).join(", ");
    let total = cart.reduce((a,b)=>a+b.p,0);
    
    showToast("Order Bhej rahe hain... 🚀");
    
    await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
            action: "create", id: id, name: user.name, mobile: user.mobile,
            address: user.address, details: details, total: total
        })
    });

    cart = [];
    showToast("Order Success! ✅");
    setTimeout(() => { showPage('view-profile'); syncStatuses(); }, 1000);
}

// Reuse other functions from your code
function showToast(msg) { let t = document.getElementById("toast"); t.innerText = msg; t.className = "show"; setTimeout(() => t.className = "", 2500); }
function askLocation() { if(navigator.geolocation) { navigator.geolocation.getCurrentPosition(p => { userMapLink = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`; document.getElementById('loc-status').innerText = "Location Pin Ho Gayi! ✅"; }, () => alert("GPS ON karo bhai!")); } }
function handleLogin() { const n = document.getElementById('l-name').value, m = document.getElementById('l-mobile').value, a = document.getElementById('l-address').value; if(!n || m.length < 10) return alert("Sahi detail bharo!"); if(!genOtp) { genOtp = Math.floor(1000 + Math.random() * 9000); document.getElementById('display-otp').innerText = genOtp; document.getElementById('otp-box').style.display = 'block'; } else { if(document.getElementById('i-otp').value == genOtp) { user = { name: n, mobile: m, address: a, map: userMapLink }; localStorage.setItem('ranaUser', JSON.stringify(user)); location.reload(); } else alert("Galat OTP!"); } }
function showPage(id) { document.getElementById('admin-view').style.display = 'none'; document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); if(id==='admin-view') { document.getElementById('admin-view').style.display = 'block'; } else { document.getElementById(id).classList.add('active'); } if(id==='view-cart') renderCart(); if(id==='view-profile') syncStatuses(); }
function loadSubs(main) { let subs = {}; let lastM = ""; masterData.forEach(r => { let m = r.c[2]?.v || lastM; lastM = m; if(m.toLowerCase().includes(main.toLowerCase().substring(0,3))) { let s = (main === 'Masale') ? r.c[1]?.v : r.c[3]?.v; if(s && !subs[s]) subs[s] = r.c[6]?.v || ""; } }); let html = ''; for(let s in subs) html += `<div style="background:white; padding:15px; border-radius:15px; text-align:center;" onclick="loadProds('${main}','${s}')"><img src="${subs[s]}" style="width:100%; height:60px; object-fit:cover; border-radius:10px;"><br><b>${s}</b></div>`; document.getElementById('sub-list').innerHTML = html; showPage('view-sub'); }
function loadProds(cat, sub) { let html = ''; let lM="", lN="", lS="", lI=""; masterData.forEach(r => { let n=r.c[1]?.v||lN; lN=n; let m=r.c[2]?.v||lM; lM=m; let s=r.c[3]?.v||lS; lS=s; let i=r.c[6]?.v||lI; lI=i; let match = (cat==='Masale') ? (lN===sub) : (lM.includes(cat.substring(0,3)) && lS===sub); if(match && r.c[4]?.v) { html += `<div class="item-card"><img src="${lI}"><div><b>${lN}</b><br><small>${r.c[4].v}</small><br><b>₹${r.c[5].v}</b></div><button class="add-btn" onclick="addToBag('${lN}','${r.c[4].v}',${r.c[5].v})">ADD</button></div>`; } }); document.getElementById('prod-list').innerHTML = html; showPage('view-prod'); }
function addToBag(n, w, p) { cart.push({n, w, p}); showToast(`${n} Bag mein juda! 🛒`); }
function renderCart() { let html = '', total = 0; cart.forEach((item, i) => { total += item.p; html += `<div class="item-card"><div><b>${item.n}</b> (${item.w})<br>₹${item.p}</div><button onclick="cart.splice(${i},1);renderCart()" style="margin-left:auto; color:red; border:none; background:none;"><i class="fas fa-trash"></i></button></div>`; }); document.getElementById('cart-items-display').innerHTML = html || "<p style='text-align:center;'>Bag khali hai!</p>"; document.getElementById('cart-total-display').innerText = "Total: ₹" + total; }
function logout() { localStorage.clear(); location.reload(); }
window.onload = init;
</script>
</body>
</html>
