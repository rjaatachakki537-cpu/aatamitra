<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aata Mitra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <img src="welcome.jpg" style="width:100%; height:100%; object-fit:cover;">
    </div>

    <div id="login-screen" style="display:none; padding:20px; text-align:center;">
        <img src="welcome.jpg" style="width:120px; border-radius:50%;">
        <h2>Aata Mitra Login</h2>
        <input type="text" id="name-input" placeholder="Apna Naam">
        <input type="number" id="mobile-input" placeholder="Mobile Number">
        <button onclick="sendOTP()" style="width:100%; padding:10px; background:#f1c40f; border:none; border-radius:5px;">OTP Bhejo</button>
        <div id="otp-section" style="display:none; margin-top:10px;">
            <input type="number" id="otp-input" placeholder="OTP (1234)">
            <button onclick="verifyOTP()" style="width:100%; padding:10px; background:#27ae60; color:white; border:none; border-radius:5px;">Verify</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header style="background:#f1c40f; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <span onclick="toggleSidebar()">☰</span>
            <b id="admin-trigger">RANA JI AATA CHAKKI</b>
            <span id="cart-count" style="background:red; color:white; padding:2px 8px; border-radius:50%; font-size:12px;">0</span>
        </header>

        <div id="banner-area"></div>
        
        <div style="padding:10px; font-weight:bold;">Taza Saman 👇</div>
        <div id="product-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:10px;"></div>

        <nav style="position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; padding:15px; border-top:1px solid #ddd;">
            <span>🏠 Home</span>
            <span>🛒 Cart</span>
            <span>📦 Track</span>
        </nav>
    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>
    <script src="splash.js"></script>
</body>
</html>
