<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aata Mitra</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- =========================
SPLASH SCREEN
========================= -->

<div id="splash-screen">

<img src="welcome.jpg">

</div>


<!-- =========================
LOGIN SCREEN
========================= -->

<div id="login-screen" style="display:none">

<img src="welcome.jpg" style="width:120px;border-radius:50%;margin-bottom:15px;border:4px solid #27ae60">

<h2>Login</h2>

<input type="number" id="mobile-input" placeholder="Mobile Number">

<button onclick="sendOTP()" class="btn btn-primary">Send OTP</button>

<div id="otp-section" style="display:none">

<input type="number" id="otp-input" placeholder="Enter OTP">

<button onclick="verifyOTP()" class="btn btn-success">Verify</button>

</div>

</div>


<!-- =========================
MAIN APP
========================= -->

<div id="main-app" style="display:none">

<!-- HEADER -->

<header class="header">

<div onclick="toggleMenu()">☰</div>

<b id="admin-trigger">RANA JI AATA CHAKKI</b>

<div onclick="showTab('cart')">

🛒 <span id="cart-count">0</span>

</div>

</header>


<!-- =========================
SIDE MENU
========================= -->

<div id="side-menu" style="display:none;padding:15px;background:white">

<div id="install-btn" onclick="installApp()" style="margin-bottom:10px">
Install App
</div>

<div onclick="alert('Rana Ji Aata Chakki')">
About
</div>

<div onclick="alert('Contact: 8923357537')">
Contact
</div>

</div>


<!-- =========================
CATEGORY BAR
========================= -->

<div class="category-bar" id="category-list"></div>


<!-- =========================
BANNER
========================= -->

<div id="banner-area"></div>


<!-- =========================
PRODUCT LIST
========================= -->

<div style="padding:10px;font-weight:bold">
Taza Saman 👇
</div>

<div id="product-list"></div>


<!-- =========================
BOTTOM NAV
========================= -->

<nav class="bottom-nav">

<div class="nav-item" onclick="showTab('home')">
🏠<br>Home
</div>

<div class="nav-item" onclick="showTab('cart')">
🛒<br>Cart
</div>

<div class="nav-item" onclick="showTab('track')">
📦<br>Track
</div>

</nav>

</div>


<!-- =========================
SERVICE WORKER
========================= -->

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>


<!-- =========================
INSTALL APP LOGIC
========================= -->

<script>

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt = e;

});

function installApp(){

if(deferredPrompt){

deferredPrompt.prompt();

deferredPrompt.userChoice.then(()=>{

document.getElementById("install-btn").style.display="none";

});

}

}

</script>


<!-- =========================
MENU
========================= -->

<script>

function toggleMenu(){

let menu=document.getElementById("side-menu");

menu.style.display = menu.style.display=="none"?"block":"none";

}

</script>


<!-- =========================
JS FILES
========================= -->

<script src="script.js"></script>

<script src="auth.js"></script>

<script src="splash.js"></script>

<script src="tracking.js"></script>

<script src="admin.js"></script>

<script src="payment.js"></script>


</body>
</html>
