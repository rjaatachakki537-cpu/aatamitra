<script>
    const S_ID = '15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx';
    const G_URL = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json&sheet=Products`;

    let allProducts = [];
    let cart = [];

    async function init() {
        try {
            const r = await fetch(G_URL);
            const t = await r.text();
            const j = JSON.parse(t.substring(47, t.length - 2));
            
            // Column mapping: Column names se index nikaalna
            const cols = j.table.cols.map(c => c.label.toLowerCase().trim());
            const idx = {
                name: cols.indexOf('name'),
                cat: cols.indexOf('category'),
                sub: cols.indexOf('sub_category'),
                weight: cols.indexOf('net weight'),
                price: cols.indexOf('price'),
                img: cols.indexOf('image_url')
            };

            let lastValues = {};
            
            allProducts = j.table.rows.map(row => {
                let p = {
                    name: row.c[idx.name]?.v || lastValues.name,
                    cat: row.c[idx.cat]?.v || lastValues.cat,
                    sub: row.c[idx.sub]?.v || lastValues.sub,
                    weight: row.c[idx.weight]?.v,
                    price: row.c[idx.price]?.v,
                    img: row.c[idx.img]?.v || lastValues.img
                };
                // Fill blanks from previous row (for merged cells)
                if(p.name) lastValues.name = p.name;
                if(p.cat) lastValues.cat = p.cat;
                if(p.sub) lastValues.sub = p.sub;
                if(p.img && p.img.includes('http')) lastValues.img = p.img;
                return p;
            });
            console.log("App Ready!");
        } catch(e) { alert("Sheet Connection Error!"); }
    }

    function openView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-cart') renderCart();
    }

    function processSub(main) {
        let subs = {};
        allProducts.forEach(p => {
            let c = p.cat ? p.cat.toString().toLowerCase() : "";
            let m = main.toLowerCase();
            
            // Masale logic: check if cat is masale, mirchi, or haldi
            let match = (c === m) || (m === 'masale' && (c === 'mirchi' || c === 'haldi' || c === 'masala'));
            
            if(match && p.sub) {
                if(!subs[p.sub]) subs[p.sub] = p.img;
            }
        });

        let h = '';
        for(let s in subs) {
            let imgSrc = (subs[s] && subs[s].includes('http')) ? subs[s] : 'https://cdn-icons-png.flaticon.com/512/3081/3081913.png';
            h += `<div class="card" onclick="processProd('${main}','${s}')">
                    <img src="${imgSrc}" style="width:100%; height:110px; object-fit:cover; border-radius:15px;">
                    <h3>${s}</h3>
                  </div>`;
        }
        document.getElementById('sub-grid').innerHTML = h || `<p style="text-align:center;width:100%;">Saaman load ho raha hai...</p>`;
        document.getElementById('sub-head').innerText = main;
        openView('view-sub');
    }

    function processProd(main, sub) {
        let h = '';
        allProducts.forEach(p => {
            let c = p.cat ? p.cat.toString().toLowerCase() : "";
            let m = main.toLowerCase();
            let match = (c === m) || (m === 'masale' && (c === 'mirchi' || c === 'haldi' || c === 'masala'));

            if(match && p.sub === sub && p.price) {
                h += `<div class="item-row" style="display:flex; align-items:center; gap:15px; background:white; padding:12px; margin-bottom:10px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                        <img src="${p.img || 'https://via.placeholder.com/60'}" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">
                        <div style="flex:1">
                            <h4 style="margin:0;">${p.name}</h4>
                            <p style="margin:5px 0; color:#666;">${p.weight} - <b>₹${p.price}</b></p>
                        </div>
                        <button onclick="add('${p.name}','${p.weight}','${p.price}')" style="background:#f4b41a; border:none; padding:8px 12px; border-radius:8px; font-weight:bold;">Add +</button>
                      </div>`;
            }
        });
        document.getElementById('product-list').innerHTML = h || "No Products Found";
        document.getElementById('prod-head').innerText = sub;
        document.getElementById('btn-back-prod').onclick = () => processSub(main);
        openView('view-products');
    }

    function add(n,w,p) {
        cart.push({n,w,p:parseInt(p)});
        document.getElementById('badge').innerText = cart.length;
        alert(n + " Add ho gaya!");
    }

    function renderCart() {
        let h = '', t = 0;
        cart.forEach((item, i) => {
            t += item.p;
            h += `<div class="item-row" style="display:flex; justify-content:space-between; background:white; padding:15px; margin-bottom:10px; border-radius:10px;">
                    <div><h4 style="margin:0;">${item.n} (${item.w})</h4><b>₹${item.p}</b></div>
                    <button onclick="remove(${i})" style="color:red; border:none; background:none; font-size:18px;">&times;</button>
                  </div>`;
        });
        document.getElementById('cart-items').innerHTML = h || "<p style='text-align:center;'>Cart khaali hai</p>";
        document.getElementById('cart-total').innerHTML = `<h3 style="text-align:right;">Total: ₹${t}</h3>`;
    }

    function remove(i) { cart.splice(i,1); document.getElementById('badge').innerText = cart.length; renderCart(); }

    function sendToWA() {
        if(cart.length === 0) return alert("Pehle saman add karein!");
        let msg = "*Rana Ji Aata Chakki Order*\n\n";
        cart.forEach((item, i) => msg += `${i+1}. ${item.n} (${item.w}) - ₹${item.p}\n`);
        msg += `\n*Total Amount: ₹${cart.reduce((a,b)=>a+b.p,0)}*`;
        window.open(`https://wa.me/918923357537?text=${encodeURIComponent(msg)}`);
    }

    window.onload = init;
</script>
