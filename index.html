<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rana Ji VIP</title>
    <link rel="stylesheet" href="https://rjaatachakki537-cpu.github.io/aatamitra/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="toast"></div>

<div id="login-screen" class="full-screen">
    <h2>Namaste Rana Ji VIP! 🙏</h2>
    <input type="text" id="l-name" placeholder="Pura Naam">
    <input type="number" id="l-mobile" placeholder="WhatsApp Number">
    <input type="email" id="l-email" placeholder="Email (Notification ke liye)">
    <input type="text" id="l-address" placeholder="Address">
    <button class="submit-btn" onclick="handleLogin()">Login Karein</button>
</div>

<div class="header"><b>RANA JI AATA CHAKKI</b></div>

<div id="view-home" class="view active">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
        <div style="background:raibow color; padding:20px; border-radius:15px; text-align:center;" onclick="loadSubs('Aata')"><b>Aata</b></div>
        <div style="background:raibow color; padding:20px; border-radius:15px; text-align:center;" onclick="loadSubs('Mustered oil')"><b>Oil</b></div>
        <div style="background:raibow color; padding:20px; border-radius:15px; text-align:center;" onclick="loadSubs('Masale')"><b>Masale</b></div>
    </div>
</div>

<div id="view-sub" class="view"><button onclick="showPage('view-home')">BACK</button><div id="sub-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;"></div></div>
<div id="view-prod" class="view"><button onclick="showPage('view-sub')">BACK</button><div id="prod-list"></div></div>

<div id="view-cart" class="view">
    <h3 id="cart-header">My Shopping Bag</h3>
    <div id="cart-items-display"></div>
    <div id="cart-total-display" style="font-weight:bold; text-align:right;">Total amount: ₹0</div>
    <textarea id="order-custom-note" placeholder="Extra note..."></textarea>
    <button class="submit-btn" id="confirm-btn-text" onclick="confirmOrder()">Place Order</button>
</div>

<div id="view-profile" class="view">
    <div style="background:green+yellow; padding:20px; border-radius:15px; text-align:center; position:relative;">
        <div style="position:relative; width:100px; height:100px; margin:0 auto 10px;">
            <img id="user-img-display" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100%; height:100%; border-radius:50%; object-fit:cover; border:3px solid var(--main);">
            <label for="img-input" style="position:absolute; bottom:0; right:0; background:var(--main); color:blue; padding:5px; border-radius:50%; cursor:pointer; font-size:12px;">
                <i class="fas fa-camera"></i>
            </label>
            <input type="file" id="img-input" accept="image/*" style="display:none;" onchange="updateProfilePic(this)">
        </div>

        <h3 id="p-name" style="margin:5px 0;">Loading...</h3>
        <p id="p-phone" style="color:gray; margin:0; font-size:13px;"></p>
        
        <button onclick="toggleEditMode()" style="background:none; border:1px solid var(--main); color:var(--main); padding:5px 15px; border-radius:20px; margin-top:10px; font-size:12px;">
            <i class="fas fa-edit"></i> Edit Details
        </button>

        <div id="edit-form" style="display:none; margin-top:20px; text-align:left; border-top:1px solid #eee; padding-top:15px;">
            <input type="text" id="e-name" placeholder="Naya Naam">
            <input type="number" id="e-mobile" placeholder="Naya Mobile">
            <textarea id="e-address" placeholder="Naya Address"></textarea>
            <button class="submit-btn" onclick="saveProfileChanges()" style="padding:10px;">Save Change Karein</button>
        </div>
    </div>

    <h4 style="margin-top:20px;">Mere Purane Orders</h4>
    <div id="order-history"></div>
</div>
    <b id="p-name">Loading...</b>
    <div id="order-history"></div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showPage('view-home')">Home</div>
    <div class="nav-item" onclick="showPage('view-cart')">Bag</div>
    <div class="nav-item" onclick="showPage('view-profile')">Profile</div>
</div>

<script src="https://rjaatachakki537-cpu.github.io/aatamitra/script.js"></script>

</body>
</html>
