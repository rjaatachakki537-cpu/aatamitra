<!DOCTYPE html><html lang="hi"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rana Ji VIP | Order Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #2874f0; --yellow: #f4b41a; --bg: #f1f3f6; --red: #fb641b; --green: #25D366; --gray: #777; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); padding-bottom: 80px; overflow-x: hidden; }
        .header { background: var(--main); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .full-screen { position: fixed; inset: 0; background: white; z-index: 10000; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .view { display: none; padding: 10px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Status Badges */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; float: right; text-transform: uppercase; }
        .s-PENDING { background: #fff3e0; color: #ff9800; }
        .s-CONFIRMED { background: #e3f2fd; color: #1976d2; }
        .s-DELIVERED { background: #e8f5e9; color: #2e7d32; }

        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 5px solid var(--main); box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        
        /* New Buttons */
        .modify-btn { background: #e3f2fd; color: #1976d2; border: 1px solid #1976d2; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 11px; text-align: center; }
        .chat-btn { background: var(--green); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 11px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .cancel-btn { background: #f4433615; color: #d32f2f; border: 1px solid #d32f2f; padding: 8px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 11px; }

        .item-card { background: white; padding: 12px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; gap: 12px; }
        .item-card img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; }
        .add-btn { background: var(--yellow); border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; margin-left: auto; cursor: pointer; }

        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 10001; left: 50%; bottom: 100px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadeinout 2s; }
        @keyframes fadeinout { 0%, 100% { opacity: 0; bottom: 50px; } 20%, 80% { opacity: 1; bottom: 100px; } }

        input, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .submit-btn { background: var(--red); color: white; border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 999; }
        .nav-item { flex: 1; text-align: center; padding: 12px; color: #888; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--main); font-weight: bold; }
    </style></head><body>

<div id="toast"></div>

<div id="login-screen" class="full-screen">
    <h2 style="color:var(--main);">Namaste! 🙏</h2>
    <input type="text" id="l-name" placeholder="Pura Naam">
    <input type="number" id="l-mobile" placeholder="WhatsApp Number">
    <input type="email" id="l-email" placeholder="Email (Optional)">
    <input type="text" id="l-address" placeholder="Ghar ka Pata">
    <button class="submit-btn" onclick="handleLogin()">Aage Badhein</button>
</div>

<div class="header"><b>RANA JI AATA CHAKKI</b></div>

<div id="view-home" class="view active">
    <div style="background: linear-gradient(135deg,#1e3c72,#2a5298); color:white; padding:20px; border-radius:15px; text-align:center; margin-bottom:15px;">
        <h3 id="welcome-msg">Pure & Fresh</h3>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
        <div style="background:white; padding:20px; border-radius:15px; text-align:center;" onclick="loadSubs('Aata')"><i class="fas fa-wheat-awn" style="color:var(--yellow); font-size:30px;"></i><br><b>Aata</b></div>
        <div style="background:white; padding:20px; border-radius:15px; text-align:center;" onclick="loadSubs('Masale')"><i class="fas fa-pepper-hot" style="color:var(--red); font-size:30px;"></i><br><b>Masale</b></div>
    </div>
</div>

<div id="view-cart" class="view">
    <h3 id="cart-header">Mera Shopping Bag</h3>
    <div id="cart-items-display"></div>
    <div id="cart-total-display" style="font-weight:bold; font-size:20px; padding:15px 0; text-align:right;">Total: ₹0</div>
    <textarea id="order-custom-note" placeholder="Saman mein kuch badlav ya extra chahiye? Likhein..."></textarea>
    <button class="submit-btn" id="confirm-btn-text" onclick="confirmOrder()">Confirm Order</button>
</div>

<div id="view-profile" class="view">
    <div style="background:white; padding:15px; border-radius:15px; border-left:5px solid var(--main);">
        <b id="p-name">Loading...</b><br>
        <small id="p-addr" style="color:#888;"></small>
    </div>
    <h4 style="margin-top:20px;">Order History</h4>
    <div id="order-history"></div>
</div>

<div id="view-sub" class="view"><div id="sub-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"></div></div>
<div id="view-prod" class="view"><div id="prod-list"></div></div>

<div class="nav">
    <div class="nav-item active" id="n-home" onclick="showPage('view-home')"><i class="fas fa-home"></i><br>Home</div>
    <div class="nav-item" id="n-cart" onclick="showPage('view-cart')"><i class="fas fa-shopping-basket"></i><br>Bag</div>
    <div class="nav-item" id="n-profile" onclick="showPage('view-profile')"><i class="fas fa-user-circle"></i><br>Profile</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwXpnLfxex5KKlWaAGcuElpBN3eHVfXtia_ninNKmgCRg4eCkUoZ98f1xsqB7HfQb_/exec';
const DATA_URL = `https://docs.google.com/spreadsheets/d/15PzF3vRmqbrak8_9c4D9hqQ20jxUjWpx/gviz/tq?tqx=out:json&sheet=Products`;

let masterData = [], cart = [], user = JSON.parse(localStorage.getItem('ranaUser')), modifyingOrderId = null;
let historyData = [];

async function init() {
    if(user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('p-name').innerText = user.name;
        document.getElementById('p-addr').innerText = user.address;
        syncStatuses();
    }
    const res = await fetch(DATA_URL);
    const text = await res.text();
    masterData = JSON.parse(text.substring(47, text.length-2)).table.rows;
}

// --- MODIFICATION FEATURE ---
function startModification(orderId, oldDetails) {
    if(!confirm("Is order mein naya saman jodna hai? Bag mein purana saman load ho jayega.")) return;
    
    modifyingOrderId = orderId;
    document.getElementById('cart-header').innerText = "Modifying Order #" + orderId.slice(-6);
    document.getElementById('confirm-btn-text').innerText = "Update Order Karein";
    document.getElementById('order-custom-note').value = "MODIFIED: " + oldDetails;
    
    showToast("Purana order load ho gaya! Ab aur saman jodein.");
    showPage('view-home'); // Redirect to shop to add more items
}

async function confirmOrder() {
    if(!cart.length && !modifyingOrderId) return alert("Bag khali hai!");
    
    let id = modifyingOrderId || Date.now().toString();
    let details = cart.map(i => `${i.n}(${i.w})`).join(", ");
    let note = document.getElementById('order-custom-note').value;
    let total = cart.reduce((a,b)=>a+b.p,0);
    
    showToast("Process ho raha hai...");

    await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
            action: modifyingOrderId ? "updateOrder" : "create",
            id: id, name: user.name, mobile: user.mobile, email: user.email || "",
            address: user.address, details: details + (note ? " | Note: " + note : ""), total: total
        })
    });

    // Reset modification state
    modifyingOrderId = null;
    document.getElementById('cart-header').innerText = "Mera Shopping Bag";
    document.getElementById('confirm-btn-text').innerText = "Confirm Order";
    cart = [];
    
    showToast("Done! ✅ WhatsApp par batayein.");
    window.open(`https://wa.me/918923357537?text=Order ID #${id.toString().slice(-6)} Update/New Order Done!`, '_blank');
    
    setTimeout(() => { showPage('view-profile'); syncStatuses(); }, 1000);
}

function renderHistory() {
    let html = '';
    historyData.slice().reverse().forEach(o => {
        let status = o.status || 'PENDING';
        let shortId = o.id.toString().slice(-6);
        html += `<div class="order-card">
            <span class="status-badge s-${status}">${status}</span>
            <b>ID: #${shortId}</b><br>
            <small>${o.details}</small><br>
            <b>₹${o.total}</b>
            <div class="btn-row">
                ${status === 'PENDING' ? `<button class="modify-btn" onclick="startModification('${o.id}', '${o.details}')"><i class="fas fa-plus"></i> Saman Jodein</button>` : ''}
                <a class="chat-btn" href="https://wa.me/918923357537?text=ID %23${shortId}" target="_blank"><i class="fab fa-whatsapp"></i> Chat</a>
            </div>
        </div>`;
    });
    document.getElementById('order-history').innerHTML = html || "No orders.";
}

// --- BASIC FUNCTIONS ---
async function syncStatuses() {
    if(!user) return;
    try {
        const res = await fetch(`${SCRIPT_URL}?mobile=${user.mobile}`);
        historyData = await res.json();
        renderHistory();
    } catch(e) { console.error("Sync Error"); }
}

function showPage(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('n-' + id.split('-')[1]).classList.add('active');
    if(id==='view-cart') renderCart();
}

function loadSubs(main) {
    let subs = {}; let lastM = "";
    masterData.forEach(r => {
        let m = r.c[2]?.v || lastM; lastM = m;
        if(m.toLowerCase().includes(main.toLowerCase().substring(0,3))) {
            let s = (main === 'Masale') ? r.c[1]?.v : r.c[3]?.v;
            if(s && !subs[s]) subs[s] = r.c[6]?.v || "";
        }
    });
    let html = ''; for(let s in subs) html += `<div style="background:white; padding:15px; border-radius:15px; text-align:center;" onclick="loadProds('${main}','${s}')"><b>${s}</b></div>`;
    document.getElementById('sub-list').innerHTML = html; showPage('view-sub');
}

function loadProds(cat, sub) {
    let html = ''; let lM="", lN="", lS="", lI="";
    masterData.forEach(r => {
        let n=r.c[1]?.v||lN; lN=n; let m=r.c[2]?.v||lM; lM=m; let s=r.c[3]?.v||lS; lS=s; let i=r.c[6]?.v||lI; lI=i;
        let match = (cat==='Masale') ? (lN===sub) : (lM.includes(cat.substring(0,3)) && lS===sub);
        if(match && r.c[4]?.v) {
            html += `<div class="item-card"><img src="${lI}"><div><b>${lN}</b><br>₹${r.c[5].v}</div><button class="add-btn" onclick="addToBag('${lN}','${r.c[4].v}',${r.c[5].v})">ADD</button></div>`;
        }
    });
    document.getElementById('prod-list').innerHTML = html; showPage('view-prod');
}

function addToBag(n, w, p) { cart.push({n, w, p}); showToast(`${n} Bag mein!`); }

function renderCart() {
    let html = '', total = 0;
    cart.forEach((item, i) => { total += item.p; html += `<div class="item-card"><div><b>${item.n}</b><br>₹${item.p}</div><i class="fas fa-trash" style="margin-left:auto; color:red;" onclick="cart.splice(${i},1);renderCart()"></i></div>`; });
    document.getElementById('cart-items-display').innerHTML = html || "Bag khali hai!";
    document.getElementById('cart-total-display').innerText = "Total: ₹" + total;
}

function showToast(msg) { let t = document.getElementById("toast"); t.innerText = msg; t.className = "show"; setTimeout(() => t.className = "", 2500); }

function handleLogin() {
    const n = document.getElementById('l-name').value, m = document.getElementById('l-mobile').value, a = document.getElementById('l-address').value;
    if(!n || m.length < 10) return alert("Details bharo!");
    user = { name: n, mobile: m, address: a, email: document.getElementById('l-email').value };
    localStorage.setItem('ranaUser', JSON.stringify(user));
    location.reload();
}

window.onload = init;
</script></body></html>
